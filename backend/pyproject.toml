[tool.pytest.ini_options]
# asyncio_mode = "auto" runs all async test functions under asyncio without
# requiring the @pytest.mark.asyncio decorator on each one.
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long — handled by formatter if needed
]
