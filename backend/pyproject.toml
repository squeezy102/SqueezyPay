[tool.pytest.ini_options]
testpaths = ["tests", "../scripts/tests"]
pythonpath = ["."]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
env = ["SQUEEZYPAY_TESTING=1"]
markers = [
    "slow: integration tests that run real migrations against on-disk SQLite (deselect with -m 'not slow')",
]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long — handled by formatter if needed
]
