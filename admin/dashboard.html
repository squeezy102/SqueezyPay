<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SqueezyPay Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f172a;
      --surface:     #1e293b;
      --surface2:    #273549;
      --border:      #334155;
      --text:        #f1f5f9;
      --text-muted:  #94a3b8;
      --green:       #22c55e;
      --red:         #ef4444;
      --amber:       #f59e0b;
      --indigo:      #6366f1;
      --indigo-hover:#4f46e5;

    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.25rem; font-weight: 700; }
    header p  { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

    /* ── Service cards ───────────────────────────────────────────────────── */

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 0.875rem; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;
    }

    .status-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; min-height: 42px;
    }

    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--text-muted); flex-shrink: 0;
    }
    .dot.running { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.stopped { background: var(--red); }

    .status-label { font-size: 1rem; font-weight: 600; }
    .status-sub   { font-size: 0.75rem; color: var(--text-muted); }

    .btn-row { display: flex; gap: 8px; }

    button {
      padding: 8px 16px; border-radius: 8px; border: none;
      font-size: 0.8125rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-start { background: var(--indigo); color: #fff; }
    .btn-start:hover:not(:disabled) { background: var(--indigo-hover); }
    .btn-stop  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-stop:hover:not(:disabled)  { background: var(--border); }
    .btn-link  { background: transparent; color: var(--indigo); padding: 0; font-size: 0.75rem; text-decoration: underline; }
    .btn-link:hover { color: #818cf8; }

    /* ── Log panel ───────────────────────────────────────────────────────── */

    .log-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .log-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .log-panel-header h2 { font-size: 0.875rem; font-weight: 600; }

    /* ── Preset chips ─────────────────────────────────────────────────────── */
    .log-presets {
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    }
    .preset-chip {
      padding: 4px 11px; border-radius: 99px;
      font-size: 0.72rem; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2); color: var(--text-muted);
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .preset-chip:hover { border-color: var(--text-muted); color: var(--text); }
    .preset-chip.active {
      background: var(--indigo); border-color: var(--indigo); color: #fff;
    }

    /* ── Custom filter toggle ─────────────────────────────────────────────── */
    .log-controls-row {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .btn-custom-filter {
      padding: 4px 11px; border-radius: 99px;
      font-size: 0.72rem; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border);
      background: transparent; color: var(--text-muted);
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
    }
    .btn-custom-filter:hover { background: var(--surface2); color: var(--text); }
    .btn-custom-filter.open  { border-color: var(--text-muted); color: var(--text); }
    .btn-custom-filter svg   { width: 11px; height: 11px; transition: transform 0.15s; }
    .btn-custom-filter.open svg { transform: rotate(180deg); }

    /* ── Custom filter drawer ─────────────────────────────────────────────── */
    .custom-filter-drawer {
      display: none;
      padding: 12px 20px 14px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }
    .custom-filter-drawer.open { display: flex; }
    .drawer-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted);
    }

    .level-checks { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .level-check  {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.75rem; font-weight: 600; cursor: pointer; user-select: none;
    }
    .level-check input[type=checkbox] { accent-color: currentColor; cursor: pointer; width: 14px; height: 14px; }
    .level-check.info    { color: var(--text-muted); }
    .level-check.warning { color: var(--amber); }
    .level-check.error   { color: var(--red); }
    .level-check.request  { color: var(--indigo); }
    .level-check.response { color: var(--green); }

    /* Log body */
    #log-body {
      flex: 1;
      overflow-y: auto;
      min-height: 400px;
      max-height: 600px;
      scroll-behavior: smooth;
      background: #0d1117;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
      padding: 8px 0;
    }

    /* Date separators */
    .log-date-sep {
      padding: 6px 16px 2px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.7rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    /* Log rows — single inline line, no grid */
    .log-row {
      display: block;
      padding: 1px 16px;
      line-height: 1.6;
      font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
      font-size: 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .log-row:hover { background: rgba(255,255,255,0.04); }

    .log-ts  { color: #4b5563; }
    .log-lvl { font-weight: 700; }
    .log-lvl.level-INFO     { color: #6b7280; }
    .log-lvl.level-WARNING  { color: var(--amber); }
    .log-lvl.level-ERROR    { color: var(--red); }
    .log-lvl.level-REQUEST  { color: var(--indigo); }
    .log-lvl.level-RESPONSE { color: var(--green); }
    .log-msg { color: #e2e8f0; }
    .log-svc { color: #4b5563; }

    /* Empty state */
    #log-empty {
      padding: 40px 16px;
      text-align: center;
      color: var(--text-muted);
      font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
      font-size: 0.8rem;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px;
      font-size: 0.875rem; font-weight: 500;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <div>
    <h1>SqueezyPay Admin</h1>
    <p>Developer Dashboard</p>
  </div>
  <div style="display:flex; gap:10px; align-items:center;">
    <a href="http://localhost:5173" target="_blank" rel="noreferrer"
       style="font-size:0.75rem; color:var(--indigo); text-decoration:none; font-weight:600;">
      To Site →
    </a>
    <button class="btn-stop" onclick="refreshStatus()" style="font-size:0.75rem; padding:6px 12px;">Refresh</button>
  </div>
</header>

<div class="grid" id="service-grid">
  <!-- Populated by JS -->
</div>

<div class="log-panel">
  <div class="log-panel-header">
    <h2>Activity Log</h2>
    <div class="log-controls-row">
      <div class="log-presets" id="preset-chips">
        <!-- Populated by JS -->
      </div>
      <button class="btn-custom-filter" id="btn-custom" onclick="toggleCustomDrawer()">
        Custom
        <svg viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <a href="/api/logs/raw" target="_blank" rel="noreferrer"
         style="font-size:0.72rem; color:var(--indigo); text-decoration:underline; font-weight:600; white-space:nowrap;">
        Raw log
      </a>
    </div>
  </div>

  <div class="custom-filter-drawer" id="custom-drawer">
    <span class="drawer-label">Levels</span>
    <div class="level-checks">
      <label class="level-check info">
        <input type="checkbox" id="chk-info" onchange="applyCustomFilter()"> INFO
      </label>
      <label class="level-check warning">
        <input type="checkbox" id="chk-warning" onchange="applyCustomFilter()"> WARN
      </label>
      <label class="level-check error">
        <input type="checkbox" id="chk-error" onchange="applyCustomFilter()"> ERROR
      </label>
      <label class="level-check request">
        <input type="checkbox" id="chk-request" onchange="applyCustomFilter()"> REQ
      </label>
      <label class="level-check response">
        <input type="checkbox" id="chk-response" onchange="applyCustomFilter()"> RES
      </label>
    </div>
  </div>

  <div id="log-body">
    <div id="log-empty">Waiting for log events…</div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = 'http://localhost:9000/api';

  // ── Filter presets ────────────────────────────────────────────────────────────
  // Each preset defines which level keys pass. levelAllowed() checks against activeFilter.
  // levels: array of level keys that are SHOWN (empty = none, null = all).
  // patterns: optional array of substring matches against entry.message or entry.service.
  //   If present, entry must match at least one pattern IN ADDITION TO the level check.

  const PRESETS = [
    {
      id:       'errors',
      label:    'Errors & Warnings',
      levels:   ['WARNING', 'ERROR'],
      patterns: null,
    },
    {
      id:       'api',
      label:    'API Traffic',
      levels:   ['REQUEST', 'RESPONSE'],
      patterns: null,
    },
    {
      id:       'billing',
      label:    'Billing',
      levels:   null,
      patterns: ['bill', 'payment', 'pay', 'credential', 'autofill'],
    },
    {
      id:       'auth',
      label:    'Auth',
      levels:   null,
      patterns: ['auth', 'login', 'logout', 'passphrase', 'token', 'jwt'],
    },
    {
      id:       'all',
      label:    'All',
      levels:   null,
      patterns: null,
    },
  ];

  let activePresetId   = 'errors';  // default: WARN + ERROR only
  let customLevels     = new Set(); // used when no preset is active
  let customRequests   = false;
  let customResponses  = false;
  let autoScroll       = true;
  let allEntries       = [];
  let lastRenderedDate = null;     // tracks date separator state across appends

  // ── Helpers ───────────────────────────────────────────────────────────────

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function isRequest(entry) {
    return (entry.message || '').startsWith('[REQUEST]');
  }

  function isResponse(entry) {
    return (entry.message || '').startsWith('[RESPONSE]');
  }

  function entryLevelKey(entry) {
    if (isRequest(entry))  return 'REQUEST';
    if (isResponse(entry)) return 'RESPONSE';
    return (entry.level || 'INFO').toUpperCase();
  }

  function levelAllowed(entry) {
    const preset = PRESETS.find(p => p.id === activePresetId);

    if (!preset) {
      // custom mode
      const lk = entryLevelKey(entry);
      if (lk === 'REQUEST')  return customRequests;
      if (lk === 'RESPONSE') return customResponses;
      return customLevels.has(lk);
    }

    const lk = entryLevelKey(entry);

    // Level gate: null means all levels pass
    if (preset.levels !== null && !preset.levels.includes(lk)) return false;

    // Pattern gate: null means no pattern restriction
    if (preset.patterns !== null) {
      const haystack = ((entry.message || '') + ' ' + (entry.service || '')).toLowerCase();
      if (!preset.patterns.some(p => haystack.includes(p))) return false;
    }

    return true;
  }

  // ── Preset UI ─────────────────────────────────────────────────────────────────

  function renderPresetChips() {
    const container = document.getElementById('preset-chips');
    container.innerHTML = PRESETS.map(p => `
      <button class="preset-chip${p.id === activePresetId ? ' active' : ''}"
              onclick="selectPreset('${p.id}')">${p.label}</button>
    `).join('');
  }

  function selectPreset(id) {
    activePresetId = id;
    renderPresetChips();
    renderAll();
  }

  function toggleCustomDrawer() {
    const drawer = document.getElementById('custom-drawer');
    const btn    = document.getElementById('btn-custom');
    const isOpen = drawer.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
  }

  function applyCustomFilter() {
    activePresetId  = null; // deactivate preset when user manually adjusts
    customLevels    = new Set([
      document.getElementById('chk-info').checked    ? 'INFO'    : null,
      document.getElementById('chk-warning').checked ? 'WARNING' : null,
      document.getElementById('chk-error').checked   ? 'ERROR'   : null,
    ].filter(Boolean));
    customRequests  = document.getElementById('chk-request').checked;
    customResponses = document.getElementById('chk-response').checked;
    renderPresetChips();
    renderAll();
  }

  function fmtTime(ts) {
    if (!ts) return '';
    return ts.replace('T', ' ').slice(11, 19);
  }

  function fmtDate(ts) {
    if (!ts) return '';
    return ts.slice(0, 10);
  }

  // ── Rendering ─────────────────────────────────────────────────────────────

  function buildLogRow(entry) {
    const req = isRequest(entry);
    const res = isResponse(entry);

    let levelKey, levelLabel;
    if (req) {
      levelKey = 'REQUEST';  levelLabel = 'REQ ';
    } else if (res) {
      levelKey = 'RESPONSE'; levelLabel = 'RES ';
    } else {
      levelKey   = (entry.level || 'INFO').toUpperCase();
      levelLabel = levelKey === 'WARNING' ? 'WARN ' : levelKey + ' ';
    }

    const ts  = fmtTime(entry.timestamp);
    const svc = (entry.service || '').replace('squeezypay.', '');
    // Collapse multiline messages (e.g. tracebacks) to their first line
    const msg = (entry.message || '').split('\n')[0].trim();

    const row = document.createElement('div');
    row.className     = `log-row level-${levelKey}`;
    row.dataset.level = levelKey;

    // Single inline line: "HH:MM:SS  LEVEL  message  [svc]"
    row.innerHTML =
      `<span class="log-ts">${escHtml(ts)}  </span>` +
      `<span class="log-lvl level-${levelKey}">${levelLabel} </span>` +
      `<span class="log-msg">${escHtml(msg)}</span>` +
      (svc ? `  <span class="log-svc">[${escHtml(svc)}]</span>` : '');
    return row;
  }

  function makeDateSep(d) {
    const sep = document.createElement('div');
    sep.className   = 'log-date-sep';
    sep.textContent = '── ' + d + ' ──';
    return sep;
  }

  function renderAll() {
    const body = document.getElementById('log-body');
    body.innerHTML = '';
    lastRenderedDate = null;

    const filtered = allEntries.filter(levelAllowed);
    if (filtered.length === 0) {
      body.innerHTML = '<div id="log-empty">No log entries match the current filter.</div>';
      return;
    }

    for (const entry of filtered) {
      const d = fmtDate(entry.timestamp);
      if (d && d !== lastRenderedDate) {
        body.appendChild(makeDateSep(d));
        lastRenderedDate = d;
      }
      body.appendChild(buildLogRow(entry));
    }

    if (autoScroll) body.scrollTop = body.scrollHeight;
  }

  function appendLogRow(entry) {
    if (!levelAllowed(entry)) return;

    const body  = document.getElementById('log-body');
    const empty = document.getElementById('log-empty');
    if (empty) empty.remove();

    const d = fmtDate(entry.timestamp);
    if (d && d !== lastRenderedDate) {
      body.appendChild(makeDateSep(d));
      lastRenderedDate = d;
    }

    body.appendChild(buildLogRow(entry));
    if (autoScroll) body.scrollTop = body.scrollHeight;
  }

  // ── Status ────────────────────────────────────────────────────────────────

  async function refreshStatus() {
    try {
      const res  = await fetch(`${API}/status`);
      const data = await res.json();
      renderServices(data);
    } catch {
      renderOffline();
    }
  }

  function renderServices(data) {
    const grid = document.getElementById('service-grid');
    grid.innerHTML = Object.entries(data).map(([name, info]) => `
      <div class="card">
        <div class="card-header">
          <span class="card-title">${name}</span>
          <span class="status-sub">port ${info.port}</span>
        </div>
        <div class="status-row">
          <span class="dot ${info.running ? 'running' : 'stopped'}"></span>
          <div>
            <div class="status-label">${info.running ? 'Running' : 'Stopped'}</div>
            ${info.running && info.url ? `<div class="status-sub">${info.url}</div>` : ''}
          </div>
        </div>
        <div class="btn-row">
          <button class="btn-start" onclick="startService('${name}')" ${info.running ? 'disabled' : ''}>Start</button>
          <button class="btn-stop"  onclick="stopService('${name}')"  ${!info.running ? 'disabled' : ''}>Stop</button>
          ${info.running && info.browseable ? `<button class="btn-link" onclick="window.open('${info.url}')">Open →</button>` : ''}
        </div>
      </div>
    `).join('');
  }

  function renderOffline() {
    document.getElementById('service-grid').innerHTML = `
      <div class="card" style="grid-column:1/-1">
        <p style="color:var(--text-muted); font-size:0.875rem;">Could not reach admin server. Is it running?</p>
      </div>`;
  }

  async function startService(name) {
    const res  = await fetch(`${API}/start/${name}`, { method: 'POST' });
    const data = await res.json();
    showToast(data.message);
    setTimeout(refreshStatus, 1500);
  }

  async function stopService(name) {
    const res  = await fetch(`${API}/stop/${name}`, { method: 'POST' });
    const data = await res.json();
    showToast(data.message);
    setTimeout(refreshStatus, 800);
  }

  // ── Stream ────────────────────────────────────────────────────────────────

  async function loadRecentLogs() {
    try {
      const res = await fetch(`${API}/logs/recent?lines=200`);
      allEntries = await res.json();
      renderAll();
    } catch {
      // Backend not yet running — SSE stream will populate when it starts
    }
    startLogStream();
  }

  function startLogStream() {
    const es = new EventSource(`${API}/logs`);
    es.onmessage = (e) => {
      try {
        const entry = JSON.parse(e.data);
        allEntries.push(entry);
        if (allEntries.length > 2000) allEntries.shift();
        appendLogRow(entry);
      } catch {}
    };
  }

  // Pause auto-scroll when user manually scrolls up, resume when they return to bottom
  document.getElementById('log-body').addEventListener('scroll', function () {
    const el = this;
    autoScroll = el.scrollTop + el.clientHeight >= el.scrollHeight - 20;
  });

  // ── Toast ─────────────────────────────────────────────────────────────────

  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  renderPresetChips();
  refreshStatus();
  loadRecentLogs();
  setInterval(refreshStatus, 5000);
</script>
</body>
</html>
