<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SqueezyPay Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f172a;
      --surface:     #1e293b;
      --surface2:    #273549;
      --border:      #334155;
      --text:        #f1f5f9;
      --text-muted:  #94a3b8;
      --green:       #22c55e;
      --red:         #ef4444;
      --amber:       #f59e0b;
      --indigo:      #6366f1;
      --indigo-hover:#4f46e5;

      /* Bubble colours */
      --bubble-fe:   #1d3a5f;   /* frontend — left, blue-tinted */
      --bubble-be:   #1e3a2f;   /* backend  — right, green-tinted */
      --bubble-fe-border: #2d5a9e;
      --bubble-be-border: #2d6a4a;
      --bubble-req:        #1e1e3a;
      --bubble-req-border: #4f46e5;
      --bubble-res:        #1a2a1a;
      --bubble-res-border: #16a34a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.25rem; font-weight: 700; }
    header p  { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

    /* ── Service cards ───────────────────────────────────────────────────── */

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 0.875rem; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;
    }

    .status-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; min-height: 42px;
    }

    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--text-muted); flex-shrink: 0;
    }
    .dot.running { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.stopped { background: var(--red); }

    .status-label { font-size: 1rem; font-weight: 600; }
    .status-sub   { font-size: 0.75rem; color: var(--text-muted); }

    .btn-row { display: flex; gap: 8px; }

    button {
      padding: 8px 16px; border-radius: 8px; border: none;
      font-size: 0.8125rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-start { background: var(--indigo); color: #fff; }
    .btn-start:hover:not(:disabled) { background: var(--indigo-hover); }
    .btn-stop  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-stop:hover:not(:disabled)  { background: var(--border); }
    .btn-link  { background: transparent; color: var(--indigo); padding: 0; font-size: 0.75rem; text-decoration: underline; }
    .btn-link:hover { color: #818cf8; }

    /* ── Chat panel ──────────────────────────────────────────────────────── */

    .chat-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-header h2 { font-size: 0.875rem; font-weight: 600; }

    .chat-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    .level-checks { display: flex; gap: 12px; align-items: center; }
    .level-check  {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.75rem; font-weight: 600; cursor: pointer; user-select: none;
    }
    .level-check input[type=checkbox] { accent-color: currentColor; cursor: pointer; width: 14px; height: 14px; }
    .level-check.info    { color: var(--green); }
    .level-check.warning { color: var(--amber); }
    .level-check.error   { color: var(--red); }
    .level-check.request  { color: var(--indigo); }
    .level-check.response { color: var(--green); }

    .chat-legend {
      display: flex; gap: 16px; font-size: 0.7rem; color: var(--text-muted);
    }
    .chat-legend span { display: flex; align-items: center; gap: 5px; }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .legend-dot.fe { background: #2d5a9e; }
    .legend-dot.be { background: #2d6a4a; }

    /* Chat body */
    #chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 400px;
      max-height: 600px;
      scroll-behavior: smooth;
    }

    /* Date separators */
    .chat-date-sep {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin: 8px 0 4px;
      position: relative;
    }
    .chat-date-sep::before, .chat-date-sep::after {
      content: '';
      position: absolute;
      top: 50%; width: 30%;
      height: 1px; background: var(--border);
    }
    .chat-date-sep::before { left: 0; }
    .chat-date-sep::after  { right: 0; }

    /* Bubble rows */
    .bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 72%;
    }
    .bubble-row.fe { align-self: flex-start; flex-direction: row; }
    .bubble-row.be { align-self: flex-end;   flex-direction: row-reverse; }

    /* Sender label */
    .bubble-sender {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* The bubble itself */
    .bubble {
      border-radius: 16px;
      padding: 8px 13px;
      font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
      font-size: 0.75rem;
      line-height: 1.5;
      word-break: break-word;
      max-width: 100%;
    }
    .bubble.fe {
      background: var(--bubble-fe);
      border: 1px solid var(--bubble-fe-border);
      border-bottom-left-radius: 4px;
    }
    .bubble.be {
      background: var(--bubble-be);
      border: 1px solid var(--bubble-be-border);
      border-bottom-right-radius: 4px;
    }

    .bubble-ts {
      font-size: 0.65rem; color: var(--text-muted);
      display: block; margin-top: 3px;
    }
    .bubble-row.be .bubble-ts { text-align: right; }

    .bubble-level {
      font-weight: 700; margin-right: 6px;
    }
    .level-INFO    { color: var(--green); }
    .level-WARNING { color: var(--amber); }
    .level-ERROR   { color: var(--red); }
    .level-REQUEST  { color: var(--indigo); }
    .level-RESPONSE { color: var(--green); }

    .bubble-msg { color: var(--text); }

    .bubble.req {
      background: var(--bubble-req);
      border: 1px solid var(--bubble-req-border);
      border-bottom-right-radius: 4px;
    }
    .bubble.res {
      background: var(--bubble-res);
      border: 1px solid var(--bubble-res-border);
      border-bottom-right-radius: 4px;
    }

    /* Empty state */
    #chat-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.875rem;
      font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px;
      font-size: 0.875rem; font-weight: 500;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <div>
    <h1>SqueezyPay Admin</h1>
    <p>Developer Dashboard</p>
  </div>
  <div style="display:flex; gap:10px; align-items:center;">
    <a href="http://localhost:5173" target="_blank" rel="noreferrer"
       style="font-size:0.75rem; color:var(--indigo); text-decoration:none; font-weight:600;">
      To Site →
    </a>
    <button class="btn-stop" onclick="refreshStatus()" style="font-size:0.75rem; padding:6px 12px;">Refresh</button>
  </div>
</header>

<div class="grid" id="service-grid">
  <!-- Populated by JS -->
</div>

<div class="chat-panel">
  <div class="chat-header">
    <div style="display:flex; align-items:center; gap:16px;">
      <h2>Activity</h2>
      <div class="chat-legend">
        <span><span class="legend-dot fe"></span> Frontend</span>
        <span><span class="legend-dot be"></span> Backend</span>
      </div>
    </div>
    <div class="chat-controls">
      <div class="level-checks">
        <label class="level-check info">
          <input type="checkbox" id="chk-info" checked onchange="applyFilter()"> INFO
        </label>
        <label class="level-check warning">
          <input type="checkbox" id="chk-warning" checked onchange="applyFilter()"> WARN
        </label>
        <label class="level-check error">
          <input type="checkbox" id="chk-error" checked onchange="applyFilter()"> ERROR
        </label>
        <label class="level-check request">
          <input type="checkbox" id="chk-request" checked onchange="applyFilter()"> REQ
        </label>
        <label class="level-check response">
          <input type="checkbox" id="chk-response" checked onchange="applyFilter()"> RES
        </label>
      </div>
      <a href="/api/logs/raw" target="_blank" rel="noreferrer"
         style="font-size:0.75rem; color:var(--indigo); text-decoration:underline; font-weight:600; white-space:nowrap;">
        View raw log
      </a>
    </div>
  </div>

  <div id="chat-body">
    <div id="chat-empty">Waiting for log events…</div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = 'http://localhost:9000/api';

  let allEntries    = [];
  let activeLevels  = new Set(['INFO', 'WARNING', 'ERROR']);
  let showRequests  = true;
  let showResponses = true;
  let autoScroll    = true;

  // ── Helpers ───────────────────────────────────────────────────────────────

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function isFrontend(entry) {
    return (entry.service || '').startsWith('squeezypay.frontend');
  }

  function isRequest(entry) {
    return (entry.message || '').startsWith('[REQUEST]');
  }

  function isResponse(entry) {
    return (entry.message || '').startsWith('[RESPONSE]');
  }

  function levelAllowed(entry) {
    if (isRequest(entry))  return showRequests;
    if (isResponse(entry)) return showResponses;
    return activeLevels.has((entry.level || 'INFO').toUpperCase());
  }

  function fmtTime(ts) {
    if (!ts) return '';
    return ts.replace('T', ' ').slice(11, 19);
  }

  function fmtDate(ts) {
    if (!ts) return '';
    return ts.slice(0, 10);
  }

  // ── Rendering ─────────────────────────────────────────────────────────────

  function buildBubble(entry) {
    const fe  = isFrontend(entry);
    const req = isRequest(entry);
    const res = isResponse(entry);

    let side, label, bubbleCls, levelKey, levelLabel;
    if (req) {
      side = 'be'; label = 'Request';  bubbleCls = 'req'; levelKey = 'REQUEST';  levelLabel = 'REQ';
    } else if (res) {
      side = 'be'; label = 'Response'; bubbleCls = 'res'; levelKey = 'RESPONSE'; levelLabel = 'RES';
    } else {
      side = fe ? 'fe' : 'be';
      label = fe ? 'Frontend' : 'Backend';
      bubbleCls = side;
      levelKey = (entry.level || 'INFO').toUpperCase();
      levelLabel = levelKey;
    }

    const ts  = fmtTime(entry.timestamp);
    const svc = (entry.service || '').replace('squeezypay.', '');
    const msg = entry.message || '';

    const row = document.createElement('div');
    row.className     = `bubble-row ${side}`;
    row.dataset.level = levelKey;

    row.innerHTML = `
      <span class="bubble-sender">${escHtml(label)}</span>
      <div class="bubble ${bubbleCls}">
        <span class="bubble-level level-${levelKey}">${levelLabel} </span><span class="bubble-msg">${escHtml(msg)}</span>
        <span class="bubble-ts">${escHtml(ts)}${svc ? ' · ' + escHtml(svc) : ''}</span>
      </div>`;
    return row;
  }

  function renderAll() {
    const body = document.getElementById('chat-body');
    body.innerHTML = '';

    const filtered = allEntries.filter(levelAllowed);
    if (filtered.length === 0) {
      body.innerHTML = '<div id="chat-empty">Waiting for log events…</div>';
      return;
    }

    let lastDate = null;
    for (const entry of filtered) {
      const d = fmtDate(entry.timestamp);
      if (d && d !== lastDate) {
        const sep = document.createElement('div');
        sep.className = 'chat-date-sep';
        sep.textContent = d;
        body.appendChild(sep);
        lastDate = d;
      }
      body.appendChild(buildBubble(entry));
    }

    if (autoScroll) body.scrollTop = body.scrollHeight;
  }

  function appendBubble(entry) {
    if (!levelAllowed(entry)) return;

    const body  = document.getElementById('chat-body');
    const empty = body.querySelector('#chat-empty');
    if (empty) empty.remove();

    // Date separator if day changed
    const d = fmtDate(entry.timestamp);
    const lastSep = body.querySelector('.chat-date-sep:last-of-type');
    if (d && (!lastSep || lastSep.textContent !== d)) {
      const sep = document.createElement('div');
      sep.className = 'chat-date-sep';
      sep.textContent = d;
      body.appendChild(sep);
    }

    body.appendChild(buildBubble(entry));
    if (autoScroll) body.scrollTop = body.scrollHeight;
  }

  function applyFilter() {
    activeLevels = new Set([
      document.getElementById('chk-info').checked    ? 'INFO'    : null,
      document.getElementById('chk-warning').checked ? 'WARNING' : null,
      document.getElementById('chk-error').checked   ? 'ERROR'   : null,
    ].filter(Boolean));
    showRequests  = document.getElementById('chk-request').checked;
    showResponses = document.getElementById('chk-response').checked;
    renderAll();
  }

  // ── Status ────────────────────────────────────────────────────────────────

  async function refreshStatus() {
    try {
      const res  = await fetch(`${API}/status`);
      const data = await res.json();
      renderServices(data);
    } catch {
      renderOffline();
    }
  }

  function renderServices(data) {
    const grid = document.getElementById('service-grid');
    grid.innerHTML = Object.entries(data).map(([name, info]) => `
      <div class="card">
        <div class="card-header">
          <span class="card-title">${name}</span>
          <span class="status-sub">port ${info.port}</span>
        </div>
        <div class="status-row">
          <span class="dot ${info.running ? 'running' : 'stopped'}"></span>
          <div>
            <div class="status-label">${info.running ? 'Running' : 'Stopped'}</div>
            ${info.running && info.url ? `<div class="status-sub">${info.url}</div>` : ''}
          </div>
        </div>
        <div class="btn-row">
          <button class="btn-start" onclick="startService('${name}')" ${info.running ? 'disabled' : ''}>Start</button>
          <button class="btn-stop"  onclick="stopService('${name}')"  ${!info.running ? 'disabled' : ''}>Stop</button>
          ${info.running && info.browseable ? `<button class="btn-link" onclick="window.open('${info.url}')">Open →</button>` : ''}
        </div>
      </div>
    `).join('');
  }

  function renderOffline() {
    document.getElementById('service-grid').innerHTML = `
      <div class="card" style="grid-column:1/-1">
        <p style="color:var(--text-muted); font-size:0.875rem;">Could not reach admin server. Is it running?</p>
      </div>`;
  }

  async function startService(name) {
    const res  = await fetch(`${API}/start/${name}`, { method: 'POST' });
    const data = await res.json();
    showToast(data.message);
    setTimeout(refreshStatus, 1500);
  }

  async function stopService(name) {
    const res  = await fetch(`${API}/stop/${name}`, { method: 'POST' });
    const data = await res.json();
    showToast(data.message);
    setTimeout(refreshStatus, 800);
  }

  // ── Stream ────────────────────────────────────────────────────────────────

  async function loadRecentLogs() {
    try {
      const res = await fetch(`${API}/logs/recent?lines=200`);
      allEntries = await res.json();
      renderAll();
    } catch {
      // Backend not yet running — SSE stream will populate when it starts
    }
    startLogStream();
  }

  function startLogStream() {
    const es = new EventSource(`${API}/logs`);
    es.onmessage = (e) => {
      try {
        const entry = JSON.parse(e.data);
        allEntries.push(entry);
        if (allEntries.length > 2000) allEntries.shift();
        appendBubble(entry);
      } catch {}
    };
  }

  // Pause auto-scroll when user manually scrolls up, resume when they return to bottom
  document.getElementById('chat-body').addEventListener('scroll', function () {
    const el = this;
    autoScroll = el.scrollTop + el.clientHeight >= el.scrollHeight - 20;
  });

  // ── Toast ─────────────────────────────────────────────────────────────────

  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  refreshStatus();
  loadRecentLogs();
  setInterval(refreshStatus, 5000);
</script>
</body>
</html>
