<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SqueezyPay Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273549;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --indigo: #6366f1;
      --indigo-hover: #4f46e5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    header h1 { font-size: 1.25rem; font-weight: 700; }
    header p  { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title { font-size: 0.875rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      min-height: 42px;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }
    .dot.running { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.stopped { background: var(--red); }

    .status-label { font-size: 1rem; font-weight: 600; }
    .status-sub   { font-size: 0.75rem; color: var(--text-muted); }

    .btn-row { display: flex; gap: 8px; }

    button {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-start { background: var(--indigo); color: #fff; }
    .btn-start:hover:not(:disabled) { background: var(--indigo-hover); }
    .btn-stop  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-stop:hover:not(:disabled) { background: var(--border); }
    .btn-link  { background: transparent; color: var(--indigo); padding: 0; font-size: 0.75rem; text-decoration: underline; }
    .btn-link:hover { color: #818cf8; }

    /* Log panel */
    .log-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .log-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .log-header h2 { font-size: 0.875rem; font-weight: 600; }
    .log-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .log-filter {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.75rem;
    }

    .level-checks { display: flex; gap: 12px; align-items: center; }
    .level-check  {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.75rem; font-weight: 600; cursor: pointer;
      user-select: none;
    }
    .level-check input[type=checkbox] { accent-color: currentColor; cursor: pointer; width: 14px; height: 14px; }
    .level-check.info    { color: var(--green); }
    .level-check.warning { color: var(--amber); }
    .level-check.error   { color: var(--red); }

    /* ── Ticker ──────────────────────────────────────────────────────── */
    #ticker {
      height: 220px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 12px 20px;
      gap: 4px;
      font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
      font-size: 0.75rem;
      position: relative;
    }

    .ticker-entry {
      display: flex;
      gap: 10px;
      align-items: baseline;
      animation: fadeIn 0.25s ease;
      transition: opacity 0.6s ease;
    }
    .ticker-entry.fading { opacity: 0; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ticker-ts      { color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .ticker-level   { font-weight: 700; flex-shrink: 0; width: 54px; }
    .ticker-msg     { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Idle state */
    #ticker-idle {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
      font-size: 0.8125rem;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #ticker-idle.hidden { opacity: 0; }

    /* ── Full log pane ───────────────────────────────────────────────── */
    #log-body {
      height: 400px;
      overflow-y: auto;
      padding: 12px 0;
      font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
      font-size: 0.75rem;
      display: none;
    }

    .log-line {
      display: grid;
      grid-template-columns: 160px 60px 180px 1fr;
      gap: 8px;
      padding: 2px 20px;
      line-height: 1.6;
    }
    .log-line:hover { background: var(--surface2); }

    .log-ts      { color: var(--text-muted); white-space: nowrap; }
    .log-level   { font-weight: 700; }
    .log-service { color: #7dd3fc; }
    .log-msg     { color: var(--text); }

    .level-INFO    { color: var(--green); }
    .level-WARNING { color: var(--amber); }
    .level-ERROR   { color: var(--red); }

    .empty-log { padding: 32px 20px; text-align: center; color: var(--text-muted); font-size: 0.875rem; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px;
      font-size: 0.875rem; font-weight: 500;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <div>
    <h1>SqueezyPay Admin</h1>
    <p>Developer Dashboard</p>
  </div>
  <div style="display:flex; gap:10px; align-items:center;">
    <a href="http://localhost:5173" target="_blank" rel="noreferrer"
       style="font-size:0.75rem; color:var(--indigo); text-decoration:none; font-weight:600;">
      To Site →
    </a>
    <button class="btn-stop" onclick="refreshStatus()" style="font-size:0.75rem;">Refresh</button>
  </div>
</header>

<div class="grid" id="service-grid">
  <!-- Populated by JS -->
</div>

<div class="log-panel">
  <div class="log-header">
    <h2>Application Log</h2>
    <div class="log-controls">
      <!-- Level checkboxes - always visible, filter both ticker and full log -->
      <div class="level-checks">
        <label class="level-check info">
          <input type="checkbox" id="chk-info" checked onchange="updateLevelFilter()"> INFO
        </label>
        <label class="level-check warning">
          <input type="checkbox" id="chk-warning" checked onchange="updateLevelFilter()"> WARN
        </label>
        <label class="level-check error">
          <input type="checkbox" id="chk-error" checked onchange="updateLevelFilter()"> ERROR
        </label>
      </div>
      <!-- Full log controls - hidden in ticker mode -->
      <button class="btn-stop" id="clear-btn" onclick="clearLog()" style="font-size:0.75rem; padding:4px 10px; display:none;">Clear</button>
      <button class="btn-stop" id="scroll-btn" onclick="toggleAutoScroll()" style="font-size:0.75rem; padding:4px 10px; display:none;">Auto-scroll: ON</button>
      <!-- Always visible -->
      <button class="btn-stop" id="expand-btn" onclick="toggleExpanded()" style="font-size:0.75rem; padding:4px 10px;">Expand Logs</button>
    </div>
  </div>

  <!-- Ticker (default) -->
  <div id="ticker">
    <div id="ticker-idle">Listening for events<span id="dots"></span></div>
  </div>

  <!-- Full scrollable log (expanded mode) -->
  <div id="log-body"></div>
</div>

<div id="toast"></div>

<script>
  const API = 'http://localhost:9000/api';
  let autoScroll   = true;
  let allLogLines  = [];
  let activeLevels = new Set(['INFO', 'WARNING', 'ERROR']); // checkboxes
  let expanded     = false;

  // Fade timeout per ticker entry: INFO fades after 8s, WARNING/ERROR after 20s
  const FADE_DELAY = { INFO: 8000, WARNING: 20000, ERROR: 20000 };
  const IDLE_DELAY = 6000; // show idle state after this many ms of no activity
  let idleTimer = null;

  // ── Status ────────────────────────────────────────────────────────────────

  async function refreshStatus() {
    try {
      const res  = await fetch(`${API}/status`);
      const data = await res.json();
      renderServices(data);
    } catch {
      renderOffline();
    }
  }

  function renderServices(data) {
    const grid = document.getElementById('service-grid');
    grid.innerHTML = Object.entries(data).map(([name, info]) => `
      <div class="card">
        <div class="card-header">
          <span class="card-title">${name}</span>
          <span class="status-sub">port ${info.port}</span>
        </div>
        <div class="status-row">
          <span class="dot ${info.running ? 'running' : 'stopped'}"></span>
          <div>
            <div class="status-label">${info.running ? 'Running' : 'Stopped'}</div>
            ${info.running && info.url ? `<div class="status-sub">${info.url}</div>` : ''}
          </div>
        </div>
        <div class="btn-row">
          <button class="btn-start" onclick="startService('${name}')" ${info.running ? 'disabled' : ''}>Start</button>
          <button class="btn-stop"  onclick="stopService('${name}')"  ${!info.running ? 'disabled' : ''}>Stop</button>
          ${info.running && info.browseable ? `<button class="btn-link" onclick="window.open('${info.url}')">Open →</button>` : ''}
        </div>
      </div>
    `).join('');
  }

  function renderOffline() {
    document.getElementById('service-grid').innerHTML = `
      <div class="card" style="grid-column:1/-1">
        <p style="color:var(--text-muted); font-size:0.875rem;">Could not reach admin server. Is it running?</p>
      </div>`;
  }

  async function startService(name) {
    const res  = await fetch(`${API}/start/${name}`, { method: 'POST' });
    const data = await res.json();
    showToast(data.message);
    setTimeout(refreshStatus, 1500);
  }

  async function stopService(name) {
    const res  = await fetch(`${API}/stop/${name}`, { method: 'POST' });
    const data = await res.json();
    showToast(data.message);
    setTimeout(refreshStatus, 800);
  }

  // ── Ticker ────────────────────────────────────────────────────────────────

  function updateLevelFilter() {
    activeLevels = new Set([
      document.getElementById('chk-info').checked    ? 'INFO'    : null,
      document.getElementById('chk-warning').checked ? 'WARNING' : null,
      document.getElementById('chk-error').checked   ? 'ERROR'   : null,
    ].filter(Boolean));
    if (expanded) renderLog();
  }

  function levelAllowed(level) {
    return activeLevels.has(level || 'INFO');
  }

  function pushTicker(entry) {
    if (!levelAllowed(entry.level)) return;

    const ticker = document.getElementById('ticker');
    const idle   = document.getElementById('ticker-idle');

    // Hide idle state
    idle.classList.add('hidden');
    clearTimeout(idleTimer);

    const level = entry.level || 'INFO';
    const ts    = entry.timestamp ? entry.timestamp.replace('T', ' ').slice(11, 19) : '';
    const msg   = entry.message || '';

    const el = document.createElement('div');
    el.className = 'ticker-entry';
    el.innerHTML = `
      <span class="ticker-ts">${escHtml(ts)}</span>
      <span class="ticker-level level-${level}">${level}</span>
      <span class="ticker-msg">${escHtml(msg)}</span>
    `;
    ticker.appendChild(el);

    // Fade out after delay, then remove
    const delay = FADE_DELAY[level] ?? 8000;
    setTimeout(() => {
      el.classList.add('fading');
      setTimeout(() => {
        el.remove();
        if (ticker.querySelectorAll('.ticker-entry').length === 0) {
          showIdle();
        }
      }, 600);
    }, delay);

    // Reset idle timer
    idleTimer = setTimeout(showIdle, IDLE_DELAY + delay);
  }

  function showIdle() {
    const ticker = document.getElementById('ticker');
    if (ticker.querySelectorAll('.ticker-entry').length === 0) {
      document.getElementById('ticker-idle').classList.remove('hidden');
    }
  }

  // Animated ellipsis: dot...dot...dot...
  (function animateDots() {
    const el     = document.getElementById('dots');
    const frames = ['', '.', '..', '...'];
    let i = 0;
    setInterval(() => {
      el.textContent = frames[i % frames.length];
      i++;
    }, 500);
  })();

  // ── Full log pane ─────────────────────────────────────────────────────────

  function renderLog() {
    const body     = document.getElementById('log-body');
    const filtered = allLogLines.filter(l => levelAllowed(l.level));
    if (filtered.length === 0) {
      body.innerHTML = '<div class="empty-log">No log entries yet. Start the backend to begin logging.</div>';
      return;
    }
    body.innerHTML = filtered.map(formatLogLine).join('');
    if (autoScroll) body.scrollTop = body.scrollHeight;
  }

  function appendToFullLog(entry) {
    if (!expanded) return;
    if (!levelAllowed(entry.level)) return;
    const body  = document.getElementById('log-body');
    const empty = body.querySelector('.empty-log');
    if (empty) body.innerHTML = '';
    body.insertAdjacentHTML('beforeend', formatLogLine(entry));
    if (autoScroll) body.scrollTop = body.scrollHeight;
  }

  function formatLogLine(entry) {
    const ts      = entry.timestamp ? entry.timestamp.replace('T', ' ').slice(0, 19) : '';
    const level   = entry.level || 'INFO';
    const service = (entry.service || '').replace('squeezypay.', '');
    const msg     = entry.message || '';
    return `<div class="log-line">
      <span class="log-ts">${ts}</span>
      <span class="log-level level-${level}">${level}</span>
      <span class="log-service">${escHtml(service)}</span>
      <span class="log-msg">${escHtml(msg)}</span>
    </div>`;
  }

  function clearLog() {
    allLogLines = [];
    renderLog();
  }

  function toggleAutoScroll() {
    autoScroll = !autoScroll;
    document.getElementById('scroll-btn').textContent = `Auto-scroll: ${autoScroll ? 'ON' : 'OFF'}`;
  }

  // ── Expand / collapse ─────────────────────────────────────────────────────

  function toggleExpanded() {
    expanded = !expanded;
    const ticker  = document.getElementById('ticker');
    const logBody = document.getElementById('log-body');
    const btn     = document.getElementById('expand-btn');
    const clearB  = document.getElementById('clear-btn');
    const scrollB = document.getElementById('scroll-btn');

    if (expanded) {
      ticker.style.display  = 'none';
      logBody.style.display = 'block';
      clearB.style.display  = '';
      scrollB.style.display = '';
      btn.textContent       = 'Collapse';
      renderLog();
    } else {
      ticker.style.display  = '';
      logBody.style.display = 'none';
      clearB.style.display  = 'none';
      scrollB.style.display = 'none';
      btn.textContent       = 'Expand Logs';
    }
  }

  // ── Stream ────────────────────────────────────────────────────────────────

  async function loadRecentLogs() {
    try {
      const res   = await fetch(`${API}/logs/recent?lines=200`);
      allLogLines = await res.json();
      startLogStream();
    } catch {
      // Backend not yet running - stream will retry on next load
    }
  }

  function startLogStream() {
    const es = new EventSource(`${API}/logs`);
    es.onmessage = (e) => {
      try {
        const entry = JSON.parse(e.data);
        allLogLines.push(entry);
        if (allLogLines.length > 2000) allLogLines.shift();
        if (!expanded) {
          pushTicker(entry);
        } else {
          appendToFullLog(entry);
        }
      } catch {}
    };
  }

  // ── Helpers ───────────────────────────────────────────────────────────────

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  refreshStatus();
  loadRecentLogs();
  setInterval(refreshStatus, 5000);
</script>
</body>
</html>
