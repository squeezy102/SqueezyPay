name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (Ruff)
        run: ruff check .

      - name: Run tests with coverage
        env:
          SQUEEZYPAY_ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
          SQUEEZYPAY_SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
        run: |
          pytest --cov=. --cov-report=term-missing --cov-fail-under=80 \
            -W error::DeprecationWarning \
            -W error::PendingDeprecationWarning \
            2>&1 | tee /tmp/backend_test_output.txt
          exit ${PIPESTATUS[0]}

      - name: Warning gate (backend)
        run: |
          python ../scripts/check_ci_warnings.py \
            --input /tmp/backend_test_output.txt \
            --ignore ../.ci-ignore-warnings

      - name: Startup smoke test
        env:
          SQUEEZYPAY_ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
          SQUEEZYPAY_SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
        run: |
          # Verify all imports resolve and the app object can be constructed.
          # Catches missing dependencies and broken imports before anyone tries to run locally.
          python -c "import main; print('startup import OK')"

  admin:
    name: Admin Tests
    runs-on: windows-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: admin/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  frontend:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps 2>&1 | tee /tmp/npm_install_output.txt; exit ${PIPESTATUS[0]}

      - name: Warning gate (npm install)
        run: |
          python ../scripts/check_ci_warnings.py \
            --input /tmp/npm_install_output.txt \
            --ignore ../.ci-ignore-warnings

      - name: Lint (ESLint)
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test 2>&1 | tee /tmp/vitest_output.txt; exit ${PIPESTATUS[0]}

      - name: Warning gate (Vitest)
        run: |
          python ../scripts/check_ci_warnings.py \
            --input /tmp/vitest_output.txt \
            --ignore ../.ci-ignore-warnings

      - name: Typecheck
        run: npm run typecheck

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install root dependencies (Playwright test runner)
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start backend
        working-directory: backend
        env:
          SQUEEZYPAY_ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
          SQUEEZYPAY_SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
        run: python main.py &

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done

      - name: Seed E2E passphrase
        env:
          SQUEEZYPAY_E2E_PASSPHRASE: ${{ secrets.CI_E2E_PASSPHRASE }}
        run: |
          curl -sf -X POST http://localhost:8000/api/auth/setup \
            -H 'Content-Type: application/json' \
            -d "{\"passphrase\":\"${SQUEEZYPAY_E2E_PASSPHRASE}\"}" || true

      - name: Start frontend
        working-directory: frontend
        run: npm run dev -- --host 0.0.0.0 &

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 && break
            sleep 1
          done

      - name: Run Playwright E2E tests
        env:
          SQUEEZYPAY_E2E_PASSPHRASE: ${{ secrets.CI_E2E_PASSPHRASE }}
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  publish-wiki:
    name: Publish Wiki
    runs-on: ubuntu-latest
    needs: [backend, admin, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Push wiki/ to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/squeezy102/SqueezyPay.wiki.git" wiki-remote
          cp -r wiki/. wiki-remote/
          cd wiki-remote
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --cached --quiet && echo "No wiki changes" && exit 0
          git commit -m "wiki: sync from repo wiki/ (${GITHUB_SHA::8})"
          git push origin master
