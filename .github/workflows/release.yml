name: Build Installer

# Triggered when a version tag is pushed (e.g. v0.1.0-alpha.1)
on:
  push:
    tags:
      - "v*"

jobs:
  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # ----------------------------------------------------------------
      # 0. Verify all required secrets are present before doing any work.
      #    Fails fast with a clear error rather than leaking fallback
      #    plaintext values into workflow logs.
      # ----------------------------------------------------------------
      - name: Check required secrets
        shell: pwsh
        run: |
          $missing = @()
          if (-not "${{ secrets.SQUEEZYPAY_ENCRYPTION_KEY_TEST }}") { $missing += "SQUEEZYPAY_ENCRYPTION_KEY_TEST" }
          if (-not "${{ secrets.SANDBOX_TEST_PASSPHRASE }}")         { $missing += "SANDBOX_TEST_PASSPHRASE" }
          if ($missing.Count -gt 0) {
            foreach ($s in $missing) {
              Write-Host "::error::Required secret is not set: $s"
            }
            Write-Host "::error::Set these secrets at Settings > Secrets and variables > Actions before triggering a release."
            exit 1
          }
          Write-Host "All required secrets present."

      # ----------------------------------------------------------------
      # 1. Build frontend static files
      # ----------------------------------------------------------------
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        # Output: frontend/dist/

      # ----------------------------------------------------------------
      # 2. Build backend.exe with PyInstaller
      # ----------------------------------------------------------------
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Build backend.exe
        working-directory: backend
        run: pyinstaller backend.spec
        # Output: backend/dist/backend/ (onedir bundle)

      # ----------------------------------------------------------------
      # 2b. Smoke-test backend.exe before packaging
      #     Sets dummy env vars so the lifespan env check passes.
      #     --migrate runs Alembic against a temp DB and exits 0.
      # ----------------------------------------------------------------
      - name: Smoke-test backend.exe --migrate
        working-directory: backend
        shell: pwsh
        env:
          SQUEEZYPAY_ENCRYPTION_KEY: ${{ secrets.SQUEEZYPAY_ENCRYPTION_KEY_TEST }}
          SQUEEZYPAY_SECRET_KEY: test-secret-key-for-ci-smoke-test-only
          APPDATA: ${{ runner.temp }}
        run: |
          $exe = "dist\backend\backend.exe"
          if (-not (Test-Path $exe)) { Write-Error "backend.exe not found at $exe"; exit 1 }
          # --migrate exits 0 on success; capture output for debug
          $out = & $exe --migrate 2>&1
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { Write-Error "--migrate exited $LASTEXITCODE"; exit 1 }
          Write-Host "Smoke test passed."

      # ----------------------------------------------------------------
      # 3. Stage Playwright Chromium for the optional autofill component
      # ----------------------------------------------------------------
      - name: Install Playwright Chromium
        working-directory: backend
        shell: pwsh
        run: |
          python -m playwright install chromium --with-deps
          $playwrightDir = Join-Path $env:LOCALAPPDATA "ms-playwright"
          if (Test-Path $playwrightDir) {
            Write-Host "Staging Playwright browsers from $playwrightDir"
            Copy-Item -Recurse -Force $playwrightDir "playwright_browsers"
          } else {
            Write-Host "ms-playwright dir not found, creating empty placeholder"
            New-Item -ItemType Directory -Force -Path "playwright_browsers" | Out-Null
          }

      # ----------------------------------------------------------------
      # 4. Install Inno Setup and compile the installer
      # ----------------------------------------------------------------
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Create dist output directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path dist

      - name: Compile installer
        working-directory: installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { Write-Error "ISCC.exe not found"; exit 1 }
          # Strip leading 'v' from tag (v0.1.0-alpha.3 -> 0.1.0-alpha.3)
          $version = "${{ github.ref_name }}" -replace '^v', ''
          & $iscc /DAppVersion=$version squeezypay.iss
          if ($LASTEXITCODE -ne 0) { Write-Error "ISCC exited $LASTEXITCODE"; exit 1 }
        # Output: dist/SqueezyPay-Setup.exe

      - name: Verify installer artifact
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\SqueezyPay-Setup.exe")) {
            Write-Error "Installer artifact not found"
            exit 1
          }
          $size = (Get-Item "dist\SqueezyPay-Setup.exe").Length
          Write-Host "Installer size: $([math]::Round($size/1MB, 1)) MB"

      # ----------------------------------------------------------------
      # 5a. Binary integration test — run backend.exe directly from the
      #     build output. Tests API correctness without installer overhead.
      #     The installer is separately smoke-tested in step 5b.
      # ----------------------------------------------------------------
      - name: Integration test backend binary
        shell: pwsh
        env:
          SQUEEZYPAY_ENCRYPTION_KEY: ${{ secrets.SQUEEZYPAY_ENCRYPTION_KEY_TEST }}
          SQUEEZYPAY_SECRET_KEY: test-secret-key-for-ci-integration-test-only
          SANDBOX_TEST_PASSPHRASE: ${{ secrets.SANDBOX_TEST_PASSPHRASE }}
        run: |
          $repoRoot   = (Get-Location).Path
          $backendExe = Join-Path $repoRoot "backend\dist\backend\backend.exe"
          $workDir    = Join-Path $repoRoot "backend\dist\backend"
          if (-not (Test-Path $backendExe)) {
            Write-Error "backend.exe not found at $backendExe"; exit 1
          }

          # Read passphrase via env var — avoids PowerShell double-quote string
          # interpolation that would mangle chars like $ ` " in the secret value.
          $appdataDir = "$env:APPDATA\SqueezyPay"
          New-Item -ItemType Directory -Force -Path $appdataDir | Out-Null
          $testPassphrase = $env:SANDBOX_TEST_PASSPHRASE.Trim()
          Write-Host "Passphrase length (bootstrap): $($testPassphrase.Length)"
          [System.IO.File]::WriteAllText("$appdataDir\initial_passphrase.tmp", $testPassphrase, [System.Text.Encoding]::UTF8)

          # Start backend — redirect stdout/stderr to log files for failure diagnosis
          $logFile    = "$env:TEMP\backend_ci.log"
          $logErrFile = "$env:TEMP\backend_ci_err.log"
          $backend = Start-Process -FilePath $backendExe `
            -WorkingDirectory $workDir -PassThru -WindowStyle Hidden `
            -RedirectStandardOutput $logFile -RedirectStandardError $logErrFile

          # Wait for /health using curl.exe (bypasses WinHTTP proxy — Invoke-WebRequest
          # on GitHub-hosted Windows runners routes localhost through a proxy and never connects)
          $ready = $false
          for ($i = 0; $i -lt 60; $i++) {
            Start-Sleep 1
            $curlOut = & curl.exe -s -o /dev/null -w "%{http_code}" --max-time 2 http://localhost:8000/health 2>$null
            if ($curlOut -eq "200") { $ready = $true; break }
            if ($i % 10 -eq 9) { Write-Host "Still waiting for /health at ${i}s... (last: $curlOut)" }
          }
          if (-not $ready) {
            $exitCode = if ($backend.HasExited) { $backend.ExitCode } else { "still running" }
            Write-Host "Backend exit code: $exitCode"
            Write-Host "=== backend stdout ==="
            if (Test-Path $logFile)    { Get-Content $logFile }
            Write-Host "=== backend stderr ==="
            if (Test-Path $logErrFile) { Get-Content $logErrFile }
            if (-not $backend.HasExited) { Stop-Process -Id $backend.Id -Force }
            Write-Error "Backend did not respond to /health after 60s"; exit 1
          }
          Write-Host "Health: OK. (${i}s)"

          # Auth should be configured (passphrase bootstrap was read on startup)
          Start-Sleep 1
          $authJson = & curl.exe -s http://localhost:8000/api/auth/status 2>$null
          Write-Host "Auth response: $authJson"
          if ($authJson -notmatch '"configured"\s*:\s*true') {
            Stop-Process -Id $backend.Id -Force
            Write-Error "Auth not configured"; exit 1
          }
          Write-Host "Auth: configured."

          # Login — write passphrase to a temp file and read it back via the backend's
          # /api/auth/setup endpoint path. Use the bootstrap file itself as the source
          # of truth: read it back and send its exact bytes in the JSON body.
          # ConvertTo-Json escapes chars like & as &, which causes bcrypt mismatch.
          # Instead escape only JSON-structural chars (" and \) and embed raw UTF-8.
          $loginBodyFile = "$env:TEMP\login_body.json"
          $escapedPass = $testPassphrase -replace '\\', '\\' -replace '"', '\"'
          $loginBodyJson = "{`"passphrase`":`"$escapedPass`"}"
          Write-Host "Login body length: $($loginBodyJson.Length), passphrase length: $($testPassphrase.Length)"
          [System.IO.File]::WriteAllText($loginBodyFile, $loginBodyJson, [System.Text.Encoding]::UTF8)
          $loginJson = & curl.exe -s -X POST http://localhost:8000/api/auth/login `
            -H "Content-Type: application/json" -d "@$loginBodyFile" 2>$null
          Write-Host "Login response: $loginJson"
          if ($loginJson -notmatch '"access_token"') {
            Stop-Process -Id $backend.Id -Force
            Write-Error "Login failed — no access_token in response (length=$($loginJson.Length))"; exit 1
          }
          $token = ($loginJson | ConvertFrom-Json).access_token
          if (-not $token) { Stop-Process -Id $backend.Id -Force; Write-Error "No token parsed"; exit 1 }
          Write-Host "Login: OK."

          # Authenticated bills endpoint
          $billsJson = & curl.exe -s http://localhost:8000/api/bills/ `
            -H "Authorization: Bearer $token" 2>$null
          if ($LASTEXITCODE -ne 0) {
            Stop-Process -Id $backend.Id -Force
            Write-Error "Bills request failed"; exit 1
          }
          Write-Host "Bills endpoint: OK."

          # SPA served from /
          $spaOut = & curl.exe -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8000/ 2>$null
          if ($spaOut -ne "200") {
            Stop-Process -Id $backend.Id -Force
            Write-Error "SPA returned $spaOut (expected 200)"; exit 1
          }
          Write-Host "SPA: OK."

          Stop-Process -Id $backend.Id -Force
          Write-Host "All integration checks passed."

      # ----------------------------------------------------------------
      # 5b. Installer smoke test — verifies the installer runs to completion
      #     and lays down backend.exe and the env vars in the right places.
      #     Does not re-run the backend; binary correctness is covered above.
      # ----------------------------------------------------------------
      - name: Smoke-test installer
        shell: pwsh
        run: |
          Write-Host "Running installer..."
          $installerLog = "$env:TEMP\squeezypay_install.log"
          $proc = Start-Process -FilePath "dist\SqueezyPay-Setup.exe" `
            -ArgumentList "/SP-", "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/LOG=$installerLog" `
            -Wait -PassThru
          if (Test-Path $installerLog) { Get-Content -Path $installerLog -Tail 30 }
          if ($proc.ExitCode -ne 0) {
            Write-Error "Installer failed with exit code $($proc.ExitCode)"; exit 1
          }
          Write-Host "Installer completed (exit 0)."

          # Verify backend.exe was installed
          $installDir = "$env:ProgramFiles\SqueezyPay"
          if (-not (Test-Path $installDir)) { $installDir = "$env:LocalAppData\Programs\SqueezyPay" }
          if (-not (Test-Path "$installDir\backend.exe")) {
            Write-Error "backend.exe not found in $installDir"; exit 1
          }
          Write-Host "backend.exe present at $installDir."

          # Verify installer wrote env vars to HKCU\Environment
          $encKey    = [System.Environment]::GetEnvironmentVariable("SQUEEZYPAY_ENCRYPTION_KEY", "User")
          $secretKey = [System.Environment]::GetEnvironmentVariable("SQUEEZYPAY_SECRET_KEY",     "User")
          if (-not $encKey)    { Write-Error "SQUEEZYPAY_ENCRYPTION_KEY not written to registry"; exit 1 }
          if (-not $secretKey) { Write-Error "SQUEEZYPAY_SECRET_KEY not written to registry";     exit 1 }
          Write-Host "Registry env vars: OK."
          Write-Host "Installer smoke test passed."

      # ----------------------------------------------------------------
      # 6. Attach installer to the GitHub Release
      #    prerelease is auto-detected from tag (alpha/beta/rc suffixes)
      # ----------------------------------------------------------------
      - name: Upload installer to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/SqueezyPay-Setup.exe
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
