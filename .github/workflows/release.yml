name: Build Installer

# Triggered when a version tag is pushed (e.g. v0.1.0-alpha.1)
on:
  push:
    tags:
      - "v*"

jobs:
  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      # ----------------------------------------------------------------
      # 1. Build frontend static files
      # ----------------------------------------------------------------
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        # Output: frontend/dist/

      # ----------------------------------------------------------------
      # 2. Build backend.exe with PyInstaller
      # ----------------------------------------------------------------
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Build backend.exe
        working-directory: backend
        run: pyinstaller backend.spec
        # Output: backend/dist/backend.exe

      # ----------------------------------------------------------------
      # 2b. Smoke-test backend.exe before packaging
      #     Sets dummy env vars so the lifespan env check passes.
      #     --migrate runs Alembic against a temp DB and exits 0.
      # ----------------------------------------------------------------
      - name: Smoke-test backend.exe --migrate
        working-directory: backend
        shell: pwsh
        env:
          SQUEEZYPAY_ENCRYPTION_KEY: ${{ secrets.SQUEEZYPAY_ENCRYPTION_KEY_TEST || 'dGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0LXRlc3Q=' }}
          SQUEEZYPAY_SECRET_KEY: test-secret-key-for-ci-smoke-test-only
          APPDATA: ${{ runner.temp }}
        run: |
          $exe = "dist\backend.exe"
          if (-not (Test-Path $exe)) { Write-Error "backend.exe not found"; exit 1 }
          # --migrate exits 0 on success; capture output for debug
          $out = & $exe --migrate 2>&1
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { Write-Error "--migrate exited $LASTEXITCODE"; exit 1 }
          Write-Host "Smoke test passed."

      # ----------------------------------------------------------------
      # 3. Stage Playwright Chromium for the optional autofill component
      # ----------------------------------------------------------------
      - name: Install Playwright Chromium
        working-directory: backend
        shell: pwsh
        run: |
          python -m playwright install chromium --with-deps
          $playwrightDir = Join-Path $env:LOCALAPPDATA "ms-playwright"
          if (Test-Path $playwrightDir) {
            Write-Host "Staging Playwright browsers from $playwrightDir"
            Copy-Item -Recurse -Force $playwrightDir "playwright_browsers"
          } else {
            Write-Host "ms-playwright dir not found, creating empty placeholder"
            New-Item -ItemType Directory -Force -Path "playwright_browsers" | Out-Null
          }

      # ----------------------------------------------------------------
      # 4. Install Inno Setup and compile the installer
      # ----------------------------------------------------------------
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Create dist output directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path dist

      - name: Compile installer
        working-directory: installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { Write-Error "ISCC.exe not found"; exit 1 }
          # Strip leading 'v' from tag (v0.1.0-alpha.3 -> 0.1.0-alpha.3)
          $version = "${{ github.ref_name }}" -replace '^v', ''
          & $iscc /DAppVersion=$version squeezypay.iss
          if ($LASTEXITCODE -ne 0) { Write-Error "ISCC exited $LASTEXITCODE"; exit 1 }
        # Output: dist/SqueezyPay-Setup.exe

      - name: Verify installer artifact
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\SqueezyPay-Setup.exe")) {
            Write-Error "Installer artifact not found"
            exit 1
          }
          $size = (Get-Item "dist\SqueezyPay-Setup.exe").Length
          Write-Host "Installer size: $([math]::Round($size/1MB, 1)) MB"

      # ----------------------------------------------------------------
      # 5. Install and integration-test on the runner
      #    Runs the real installer on the windows-latest VM, starts the
      #    backend, and exercises every major endpoint. Blocks upload on
      #    failure so a broken installer is never published as a release.
      # ----------------------------------------------------------------
      - name: Install SqueezyPay and run integration tests
        shell: pwsh
        run: |
          # --- Pre-write passphrase bootstrap so auth is configured after install ---
          # The installer's passphrase wizard is skipped by /VERYSILENT, so we
          # write the tmp file the backend reads on first start to set the passphrase.
          $appdataDir = "$env:APPDATA\SqueezyPay"
          New-Item -ItemType Directory -Force -Path $appdataDir | Out-Null
          $testPassphrase = "${{ secrets.SANDBOX_TEST_PASSPHRASE || 'TestPassphrase123!' }}"
          [System.IO.File]::WriteAllText("$appdataDir\initial_passphrase.tmp", $testPassphrase, [System.Text.Encoding]::UTF8)
          Write-Host "Passphrase bootstrap written."

          # --- Install ---
          # /SP-           suppresses "This will install..." prompt (needed on headless runners)
          # /VERYSILENT    no UI
          # /SUPPRESSMSGBOXES  suppress error dialogs
          # /NORESTART     don't reboot
          # /LOG           write install log for diagnostics
          Write-Host "Running installer..."
          $installerLog = "$env:TEMP\squeezypay_install.log"
          $proc = Start-Process -FilePath "dist\SqueezyPay-Setup.exe" `
            -ArgumentList "/SP-", "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/LOG=$installerLog" `
            -Wait -PassThru
          if (Test-Path $installerLog) { Get-Content $installerLog | Select-Object -Last 20 }
          if ($proc.ExitCode -ne 0) {
            Write-Error "Installer failed with exit code $($proc.ExitCode)"; exit 1
          }
          Write-Host "Installer completed (exit 0)"

          # --- Locate backend.exe ---
          $installDir = "$env:ProgramFiles\SqueezyPay"
          if (-not (Test-Path $installDir)) { $installDir = "$env:LocalAppData\Programs\SqueezyPay" }
          $backendExe = "$installDir\backend.exe"
          if (-not (Test-Path $backendExe)) {
            Write-Error "backend.exe not found at $backendExe"; exit 1
          }
          Write-Host "backend.exe: $backendExe"

          # --- Reload env vars written by installer ---
          $encKey    = [System.Environment]::GetEnvironmentVariable("SQUEEZYPAY_ENCRYPTION_KEY", "User")
          $secretKey = [System.Environment]::GetEnvironmentVariable("SQUEEZYPAY_SECRET_KEY", "User")
          if (-not $encKey)    { Write-Error "SQUEEZYPAY_ENCRYPTION_KEY not set"; exit 1 }
          if (-not $secretKey) { Write-Error "SQUEEZYPAY_SECRET_KEY not set";    exit 1 }
          $env:SQUEEZYPAY_ENCRYPTION_KEY = $encKey
          $env:SQUEEZYPAY_SECRET_KEY     = $secretKey
          Write-Host "Env vars loaded."

          # --- Start backend ---
          Write-Host "Starting backend..."
          $backend = Start-Process -FilePath $backendExe `
            -WorkingDirectory $installDir -PassThru -WindowStyle Hidden

          # --- Wait for /health (up to 60s) ---
          $ready = $false
          for ($i = 0; $i -lt 60; $i++) {
            Start-Sleep 1
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:8000/health" -UseBasicParsing -TimeoutSec 2 -EA Stop
              if ($r.StatusCode -eq 200) { $ready = $true; break }
            } catch {}
          }
          if (-not $ready) { Stop-Process -Id $backend.Id -Force; Write-Error "Backend did not start"; exit 1 }
          Write-Host "Backend healthy."

          # --- Auth configured (passphrase was bootstrapped by installer) ---
          Start-Sleep 2
          $auth = Invoke-RestMethod -Uri "http://localhost:8000/api/auth/status" -UseBasicParsing
          if (-not $auth.configured) {
            Stop-Process -Id $backend.Id -Force
            Write-Error "Auth not configured after install"; exit 1
          }
          Write-Host "Auth: configured."

          # --- Login ---
          $loginBody = '{"passphrase":"' + "${{ secrets.SANDBOX_TEST_PASSPHRASE || 'TestPassphrase123!' }}" + '"}'
          try {
            $loginResp = Invoke-RestMethod -Uri "http://localhost:8000/api/auth/login" `
              -Method POST -Body $loginBody -ContentType "application/json" -UseBasicParsing
            $token = $loginResp.access_token
          } catch {
            Stop-Process -Id $backend.Id -Force
            Write-Error "Login failed: $_"; exit 1
          }
          if (-not $token) { Stop-Process -Id $backend.Id -Force; Write-Error "No token returned"; exit 1 }
          Write-Host "Login: OK."

          # --- Authenticated bills endpoint ---
          $headers = @{ Authorization = "Bearer $token" }
          try {
            $bills = Invoke-RestMethod -Uri "http://localhost:8000/api/bills/" -Headers $headers -UseBasicParsing
            Write-Host "Bills endpoint: OK (count=$($bills.Count))"
          } catch {
            Stop-Process -Id $backend.Id -Force
            Write-Error "Bills endpoint failed: $_"; exit 1
          }

          # --- SPA served from / ---
          try {
            $spa = Invoke-WebRequest -Uri "http://localhost:8000/" -UseBasicParsing -TimeoutSec 5
            if ($spa.StatusCode -ne 200 -or $spa.Content -notmatch "SqueezyPay") {
              Stop-Process -Id $backend.Id -Force
              Write-Error "SPA not served correctly (status=$($spa.StatusCode))"; exit 1
            }
            Write-Host "SPA: OK."
          } catch {
            Stop-Process -Id $backend.Id -Force
            Write-Error "SPA request failed: $_"; exit 1
          }

          Stop-Process -Id $backend.Id -Force
          Write-Host ""
          Write-Host "All integration checks passed."

      # ----------------------------------------------------------------
      # 6. Attach installer to the GitHub Release
      #    prerelease is auto-detected from tag (alpha/beta/rc suffixes)
      # ----------------------------------------------------------------
      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SqueezyPay-Setup.exe
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
